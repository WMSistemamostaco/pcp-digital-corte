<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>PCP Digital</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #7c3aed;
      --primary-lt: #ede9fe;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #d97706;
      --muted: #6b7280;
      --border: #e5e7eb;
      --bg: #f8f9fb;
      --card: #ffffff;
      --text: #111827;
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── NAV ── */
    .top-nav {
      background: white; padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .top-nav-left { display: flex; align-items: center; gap: 18px; }
    .nav-icon { color: var(--muted); cursor: pointer; display: flex; align-items: center; }
    .nav-icon svg { width: 22px; height: 22px; }

    /* ── PAGE ── */
    .page { max-width: 960px; margin: 0 auto; padding: 24px 16px 80px; }

    /* ── PERÍODO ── */
    .periodo-card {
      background: white; border-radius: var(--radius);
      padding: 20px 24px; margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .periodo-titulo {
      display: flex; align-items: center; gap: 8px;
      font-size: 1rem; font-weight: 700; margin-bottom: 18px;
    }
    .periodo-titulo::before {
      content: ''; display: block; width: 4px; height: 20px;
      background: var(--primary); border-radius: 2px;
    }
    .periodo-form { display: flex; gap: 14px; align-items: flex-end; flex-wrap: wrap; }
    .form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 120px; }
    .form-group label { font-size: 0.82rem; color: var(--muted); font-weight: 500; }
    .form-group input {
      border: 1.5px solid var(--border); border-radius: 10px;
      padding: 12px 14px; font-size: 0.95rem; font-family: 'Inter', sans-serif;
      color: var(--text); outline: none; transition: border-color .2s; background: white;
    }
    .form-group input:focus { border-color: var(--primary); }
    .btn-recarregar {
      background: var(--primary); color: white; border: none; border-radius: 10px;
      padding: 12px 22px; font-size: 0.9rem; font-weight: 600;
      font-family: 'Inter', sans-serif; cursor: pointer;
      display: flex; align-items: center; gap: 8px; white-space: nowrap;
      transition: background .15s; flex-shrink: 0;
    }
    .btn-recarregar:hover { background: #6d28d9; }
    .btn-recarregar svg { width: 16px; height: 16px; }

    /* ── SEMANA CARD ── */
    .semana-card {
      background: white; border-radius: var(--radius);
      box-shadow: 0 1px 4px rgba(0,0,0,0.07); overflow: hidden; margin-bottom: 20px;
    }
    .semana-header {
      background: #f5f3ff; padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 10px; border-bottom: 1px solid #ede9fe;
    }
    .semana-header-left { display: flex; align-items: center; gap: 12px; }
    .semana-titulo { font-size: 1.5rem; font-weight: 700; }
    .badge-comandos {
      background: var(--primary-lt); color: var(--primary);
      font-size: 0.75rem; font-weight: 600; padding: 4px 12px; border-radius: 20px;
    }
    .semana-stats { display: flex; gap: 20px; flex-wrap: wrap; }
    .stat-item { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; font-weight: 600; }
    .stat-item svg { width: 16px; height: 16px; color: var(--muted); }
    .busca-wrap { padding: 12px 16px; border-bottom: 1px solid var(--border); position: relative; }
    .busca-wrap svg { position: absolute; left: 28px; top: 50%; transform: translateY(-50%); color: var(--muted); width: 16px; height: 16px; }
    .busca-input {
      width: 100%; padding: 9px 12px 9px 36px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 0.85rem; font-family: 'Inter', sans-serif; background: var(--bg); outline: none;
    }
    .busca-input:focus { border-color: var(--primary); }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    thead tr { border-bottom: 2px solid var(--border); }
    thead th { padding: 12px 16px; text-align: left; font-weight: 600; white-space: nowrap; }
    thead th.num { text-align: right; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; cursor: pointer; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fafafa; }
    tbody td { padding: 14px 16px; vertical-align: middle; }
    tbody td.num { text-align: right; }
    .td-comando { font-weight: 700; font-size: 0.85rem; white-space: nowrap; }
    .td-cor  { color: var(--muted); }
    .td-desc { color: var(--muted); }
    .td-baixado-ok  { color: var(--success); font-weight: 700; }
    .td-baixado-med { color: var(--warning); font-weight: 700; }
    .td-baixado-low { color: var(--danger);  font-weight: 700; }
    .td-saldo-zero  { color: var(--success); font-weight: 700; }
    .td-saldo-pend  { color: var(--warning); font-weight: 700; }
    .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
    .empty p { font-weight: 600; margin-top: 10px; }

    /* ══════════════════════════════════
       FICHA TÉCNICA (tela de detalhe)
    ══════════════════════════════════ */
    #tela-ficha {
      display: none;
      position: fixed; inset: 0;
      background: var(--bg);
      z-index: 500;
      overflow-y: auto;
    }

    /* Header da ficha */
    .ficha-nav {
      background: var(--primary); color: white;
      padding: 14px 20px;
      display: flex; align-items: center; gap: 14px;
      position: sticky; top: 0; z-index: 10;
    }
    .ficha-nav-back {
      background: rgba(255,255,255,0.2); border: none; color: white;
      border-radius: 8px; padding: 7px 14px;
      font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.82rem;
      cursor: pointer; flex-shrink: 0;
    }
    .ficha-nav-title .cmd  { font-size: 1rem; font-weight: 700; }
    .ficha-nav-title .prod { font-size: 0.74rem; opacity: .8; margin-top: 2px; }

    .ficha-body { max-width: 960px; margin: 0 auto; padding: 20px 16px 60px; }

    /* Cabeçalho laranja/info igual ao Excel */
    .ficha-header-box {
      background: white; border-radius: var(--radius);
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      overflow: hidden; margin-bottom: 16px;
    }
    .ficha-header-top {
      background: #ea580c; color: white;
      padding: 10px 16px;
      display: flex; flex-wrap: wrap; gap: 8px 24px;
      font-size: 0.82rem; font-weight: 700;
    }
    .ficha-header-top span { opacity: .85; font-weight: 400; }
    .ficha-header-top strong { font-weight: 700; }

    .ficha-header-info {
      padding: 12px 16px;
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
    }
    @media(min-width:500px){ .ficha-header-info { grid-template-columns: repeat(4, 1fr); } }
    .fhi-item .fhi-lbl { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
    .fhi-item .fhi-val { font-size: 0.9rem; font-weight: 700; margin-top: 2px; }

    /* Tabela de riscos */
    .ficha-card {
      background: white; border-radius: var(--radius);
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      overflow: hidden; margin-bottom: 16px;
    }
    .ficha-card-title {
      background: var(--primary-lt); color: var(--primary);
      padding: 10px 16px; font-size: 0.78rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .5px;
      border-bottom: 1px solid #ddd6fe;
    }

    .riscos-wrap { overflow-x: auto; }
    .riscos-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; min-width: 700px; }
    .riscos-table th, .riscos-table td {
      border: 1px solid var(--border);
      padding: 8px 6px; text-align: center;
    }
    .riscos-table thead th {
      background: #f5f3ff; font-weight: 700; font-size: 0.75rem; color: var(--text);
    }
    .riscos-table thead th.tam-col { color: var(--danger); font-weight: 800; }
    .riscos-table tbody .row-label {
      background: #f9fafb; font-weight: 700; font-size: 0.75rem;
      text-align: left; padding-left: 10px; white-space: nowrap;
    }
    .riscos-table tbody .row-grade { background: #f0fdf4; }
    .riscos-table tbody .row-tt    { background: #fefce8; font-weight: 700; }
    .riscos-table .col-total { background: #ede9fe; font-weight: 800; color: var(--primary); }
    .riscos-table .val-blue  { color: #2563eb; font-weight: 700; }
    .riscos-table .val-empty { color: #d1d5db; }

    /* Totais à direita */
    .riscos-totais-wrap { overflow-x: auto; }
    .riscos-totais {
      width: 100%; border-collapse: collapse; font-size: 0.8rem; min-width: 360px;
    }
    .riscos-totais th, .riscos-totais td {
      border: 1px solid var(--border); padding: 8px 10px; text-align: center;
    }
    .riscos-totais thead th { background: #f5f3ff; font-weight: 700; font-size: 0.75rem; }
    .riscos-totais .row-label { background: #f9fafb; font-weight: 700; font-size: 0.75rem; text-align: left; padding-left: 10px; }
    .riscos-totais .ef-ok  { color: var(--success); font-weight: 800; }
    .riscos-totais .ef-med { color: var(--warning); font-weight: 800; }
    .riscos-totais .ef-low { color: var(--danger);  font-weight: 800; }
    .riscos-totais .total-row { background: #fef3c7; font-weight: 700; }

    /* Resumo corte */
    .resumo-corte-grid {
      display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 16px;
    }
    @media(min-width:500px){ .resumo-corte-grid { grid-template-columns: repeat(4,1fr); } }
    .rc-item {
      background: white; border-radius: 10px;
      padding: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); text-align: center;
    }
    .rc-item .rc-lbl { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
    .rc-item .rc-val { font-size: 1.2rem; font-weight: 800; margin-top: 4px; color: var(--primary); }

    /* Responsáveis */
    .resp-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .resp-table th, .resp-table td {
      border: 1px solid var(--border); padding: 10px 12px;
    }
    .resp-table thead th { background: #f5f3ff; font-weight: 700; text-align: center; }
    .resp-table tbody .resp-label { background: #f9fafb; font-weight: 700; width: 110px; }
    .resp-table tbody td { color: var(--muted); font-size: 0.78rem; }
    .local-tecido {
      background: white; border-radius: 10px;
      padding: 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      margin-top: 14px;
    }
    .local-tecido .lbl { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; margin-bottom: 6px; }
    .local-tecido .val { font-size: 0.88rem; color: var(--muted); font-style: italic; }

    @media(max-width:600px){
      thead th, tbody td { padding: 10px 10px; font-size: 0.82rem; }
      .td-produto { max-width: 130px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .semana-stats { gap: 12px; }
      .stat-item { font-size: 0.78rem; }
    }
  </style>
</head>

        <tbody id="f-resp-body"></tbody>

      <div class="local-tecido">
        <div class="lbl">Local do Tecido</div>
        <div class="val" id="f-local-tecido">—</div>
      </div>
    </div>

  </div>
</div>

// Ficha genérica para OPs sem ficha cadastrada
function fichaGenerica(op) {
  return {
    faccao:"VIA GRÁFIT", rem:"12", data: new Date().toLocaleDateString('pt-BR'),
    hora:"", lavanderia:"—",
    ref: op.comando.replace("OPD","").replace(".1","").replace(".2",""),
    modelo: op.produto, tecido: op.tecido, cor: op.cor, largura:"—",
    tamanhos:[34,36,38,40,42,44,46,48],
    grade:{},
    riscos:[],
    ttCorte: op.qtd, ttCorteG: op.qtd, cortePlus:0,
    pecaRisco:"—", tecidoPeca:"—", totalRiscos:0,
    responsaveis:[
      { etapa:"ENFESTO", responsavel:"", dataIni:"", dataFim:"", obs:"" },
      { etapa:"CORTE",   responsavel:"", dataIni:"", dataFim:"", obs:"" },
      { etapa:"CARIMBO", responsavel:"", dataIni:"", dataFim:"", obs:"" },
      { etapa:"COSTURA", responsavel:"", dataIni:"", dataFim:"", obs:"" },
    ],
    localTecido:""
  };
}

// ── Utilitários ──
let buscaAtual = '';
function pct(b, t) { return t > 0 ? Math.round(b / t * 100) : 0; }
function efCor(ef) { return ef >= 88 ? 'var(--success)' : ef >= 80 ? 'var(--warning)' : 'var(--danger)'; }
function efClasse(ef) { return ef >= 88 ? 'ef-ok' : ef >= 80 ? 'ef-med' : 'ef-low'; }

// ── LISTA ──
function getDados() {
  const ini = parseInt(document.getElementById('sem-ini').value) || 1;
  const fin = parseInt(document.getElementById('sem-fin').value) || 52;
  return dadosPCP.filter(op => {
    const inRange = op.semana >= ini && op.semana <= fin;
    const txt = (op.comando + op.produto + op.cor + op.desc + op.tecido).toLowerCase();
    return inRange && (!buscaAtual || txt.includes(buscaAtual.toLowerCase()));
  });
}

function renderSemana() {
  const ini  = parseInt(document.getElementById('sem-ini').value) || 12;
  const ops  = getDados();
  const tQtd = ops.reduce((s,o) => s + o.qtd, 0);
  const tBx  = ops.reduce((s,o) => s + o.baixado, 0);
  const tSld = tQtd - tBx;

  const card = document.getElementById('semana-card');
  card.innerHTML = `
    <div class="semana-header">
      <div class="semana-header-left">
        <span class="semana-titulo">Semana ${ini}</span>
        <span class="badge-comandos">${ops.length} comandos</span>
      </div>
      <div class="semana-stats">
        <div class="stat-item">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg>
          Qtd: ${tQtd.toLocaleString('pt-BR')}
        </div>
        <div class="stat-item">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9 12l2 2 4-4"/></svg>
          Baixado: ${tBx.toLocaleString('pt-BR')}
        </div>
        <div class="stat-item">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Saldo: ${tSld.toLocaleString('pt-BR')}
        </div>
      </div>
    </div>

    <div class="busca-wrap">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input class="busca-input" type="text" placeholder="Buscar comando, produto, cor..."
        value="${buscaAtual}" oninput="setBusca(this.value)" />
    </div>

    <div class="table-wrap">
      ${ops.length === 0
        ? `<div class="empty">
             <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
               <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
             </svg>
             <p>Nenhuma OP encontrada</p>
           </div>`
        : `<table>
             <thead>
               <tr>
                 <th>Comando</th><th>Produto</th><th>Cor</th>
                 <th>Descrição</th>
                 <th class="num">Quantidade</th>
                 <th class="num">Baixado</th>
                 <th class="num">Saldo</th>
               </tr>
             </thead>
             <tbody>
               ${ops.map(op => {
                 const saldo = op.qtd - op.baixado;
                 const p     = pct(op.baixado, op.qtd);
                 const bCls  = p===100 ? 'td-baixado-ok' : p>=60 ? 'td-baixado-med' : 'td-baixado-low';
                 const sCls  = saldo===0 ? 'td-saldo-zero' : 'td-saldo-pend';
                 return `
                 <tr onclick="abrirFicha('${op.comando}')">
                   <td class="td-comando">${op.comando}</td>
                   <td class="td-produto">${op.produto}</td>
                   <td class="td-cor">${op.cor}</td>
                   <td class="td-desc">${op.desc}</td>
                   <td class="num">${op.qtd}</td>
                   <td class="num ${bCls}">${op.baixado} (${p},0%)</td>
                   <td class="num ${sCls}">${saldo}</td>
                 </tr>`;
               }).join('')}
             </tbody>
           </table>`
      }
    </div>
  `;
}

function recarregar() { buscaAtual = ''; renderSemana(); }
function setBusca(v)  { buscaAtual = v; renderSemana(); }

// ── FICHA TÉCNICA ──
function abrirFicha(cmdId) {
  const op     = dadosPCP.find(o => o.comando === cmdId);
  const ficha  = fichas[cmdId] || fichaGenerica(op);
  const tams   = ficha.tamanhos;

  // header
  document.getElementById('f-cmd').textContent       = op.comando;
  document.getElementById('f-prod').textContent      = op.produto;
  document.getElementById('f-faccao').textContent    = ficha.faccao;
  document.getElementById('f-rem').textContent       = ficha.rem;
  document.getElementById('f-data').textContent      = ficha.data + (ficha.hora ? ' ' + ficha.hora : '');
  document.getElementById('f-lavanderia').textContent= ficha.lavanderia;
  document.getElementById('f-ref').textContent       = ficha.ref;
  document.getElementById('f-opd').textContent       = op.comando;
  document.getElementById('f-modelo').textContent    = ficha.modelo;
  document.getElementById('f-tecido').textContent    = ficha.tecido + ' - ' + ficha.cor;
  document.getElementById('f-cor').textContent       = ficha.cor;
  document.getElementById('f-largura').textContent   = ficha.largura + ' m';

  // resumo rápido
  const totalEf = ficha.riscos.length
    ? (ficha.riscos.reduce((s,r)=>s+r.ef,0)/ficha.riscos.length).toFixed(0)
    : op.ef;
  const totalMetros = ficha.riscos.reduce((s,r)=>s+(r.metros||0),0).toFixed(2);
  document.getElementById('f-resumo').innerHTML = `
    <div class="rc-item"><div class="rc-lbl">TT Corte</div><div class="rc-val">${ficha.ttCorte}</div></div>
    <div class="rc-item"><div class="rc-lbl">Nº Riscos</div><div class="rc-val">${ficha.totalRiscos}</div></div>
    <div class="rc-item"><div class="rc-lbl">Total Metros</div><div class="rc-val">${totalMetros}</div></div>
    <div class="rc-item"><div class="rc-lbl">Ef. Média</div>
      <div class="rc-val" style="color:${efCor(parseInt(totalEf))}">${totalEf}%</div>
    </div>
  `;

  // Tabela riscos
  const rTbl = document.getElementById('f-riscos-table');
  rTbl.innerHTML = `
    <thead>
      <tr>
        <th style="text-align:left;min-width:60px">Risco</th>
        ${tams.map(t=>`<th class="tam-col">${t}</th>`).join('')}
        <th class="col-total">TOTAL</th>
      </tr>
    </thead>
    <tbody>
      <tr class="row-grade">
        <td class="row-label">GRADE</td>
        ${tams.map(t=>{
          const v = ficha.grade[t];
          return `<td class="${v?'val-blue':'val-empty'}">${v||''}</td>`;
        }).join('')}
        <td class="col-total">${Object.values(ficha.grade).reduce((s,v)=>s+v,0)}</td>
      </tr>
      ${ficha.riscos.length ? ficha.riscos.map(r=>{
        const tot = Object.values(r.tamanhos).reduce((s,v)=>s+v,0);
        return `
        <tr>
          <td class="row-label">${r.id}</td>
          ${tams.map(t=>{
            const v = r.tamanhos[t];
            return `<td class="${v?'val-blue':'val-empty'}">${v||''}</td>`;
          }).join('')}
          <td class="col-total">${tot}</td>
        </tr>`;
      }).join('') : `<tr><td class="row-label" colspan="${tams.length+2}" style="text-align:center;color:var(--muted);padding:16px">Nenhum risco cadastrado</td></tr>`}
      <tr class="row-tt">
        <td class="row-label">TT Corte</td>
        ${tams.map(t=>{
          const v = ficha.grade[t];
          return `<td>${v||''}</td>`;
        }).join('')}
        <td class="col-total">${ficha.ttCorte}</td>
      </tr>
    </tbody>
  `;

  // Totais por risco
  const tTbl = document.getElementById('f-totais-table');
  if (ficha.riscos.length) {
    const totalEnf = ficha.riscos.reduce((s,r)=>s+(r.enfesto||0),0).toFixed(3);
    const totalMet = ficha.riscos.reduce((s,r)=>s+(r.metros||0),0).toFixed(2);
    tTbl.innerHTML = `
      <thead>
        <tr>
          <th style="text-align:left">Risco</th>
          <th>Dobras</th>
          <th>Enfesto</th>
          <th>Metros</th>
          <th>Ef. Risco (%)</th>
        </tr>
      </thead>
      <tbody>
        ${ficha.riscos.map(r=>`
        <tr>
          <td class="row-label">${r.id}</td>
          <td>${r.dobras}</td>
          <td>${r.enfesto.toFixed(3)}</td>
          <td>${r.metros.toFixed(2)}</td>
          <td class="${efClasse(r.ef)}">${r.ef}%</td>
        </tr>`).join('')}
        <tr class="total-row">
          <td class="row-label">TOTAL / MÉDIA</td>
          <td>${ficha.riscos.reduce((s,r)=>s+r.dobras,0)}</td>
          <td>${totalEnf}</td>
          <td>${totalMet}</td>
          <td class="${efClasse(parseInt(totalEf))}">${totalEf}%</td>
        </tr>
        <tr>
          <td class="row-label" colspan="2">Peça/Risco</td>
          <td colspan="3">${ficha.pecaRisco} | Tecido/Peça: ${ficha.tecidoPeca}</td>
        </tr>
      </tbody>
    `;
  } else {
    tTbl.innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:16px">Sem dados de risco</td></tr>`;
  }

  // Responsáveis
  document.getElementById('f-resp-body').innerHTML = ficha.responsaveis.map(r=>`
    <tr>
      <td class="resp-label">${r.etapa}</td>
      <td>${r.responsavel || '—'}</td>
      <td>${r.dataIni || '—'}</td>
      <td>${r.dataFim || '—'}</td>
      <td>${r.obs || '—'}</td>
    </tr>`).join('');

  document.getElementById('f-local-tecido').textContent = ficha.localTecido || '—';

  // Abre a tela
  document.getElementById('tela-ficha').style.display = 'block';
  document.getElementById('tela-ficha').scrollTop = 0;
}

function fecharFicha() {
  document.getElementById('tela-ficha').style.display = 'none';
}

// ── Init ──
renderSemana();
</script>

</html>
