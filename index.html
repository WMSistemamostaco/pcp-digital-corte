<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>PCP Digital</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #7c3aed;
      --primary-lt: #ede9fe;
      --success: #16a34a;
      --success-lt: #dcfce7;
      --muted: #6b7280;
      --border: #e5e7eb;
      --bg: #f8f9fb;
      --card: #ffffff;
      --text: #111827;
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── TOP NAV ── */
    .top-nav {
      background: white;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .top-nav-left { display: flex; align-items: center; gap: 18px; }
    .nav-icon { color: var(--muted); cursor: pointer; display: flex; align-items: center; }
    .nav-icon svg { width: 22px; height: 22px; }

    /* ── CONTAINER ── */
    .page { max-width: 960px; margin: 0 auto; padding: 24px 16px 80px; }

    /* ── CARD PERÍODO ── */
    .periodo-card {
      background: white;
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .periodo-titulo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 18px;
    }
    .periodo-titulo::before {
      content: '';
      display: block;
      width: 4px;
      height: 20px;
      background: var(--primary);
      border-radius: 2px;
    }
    .periodo-form {
      display: flex;
      gap: 14px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 120px; }
    .form-group label { font-size: 0.82rem; color: var(--muted); font-weight: 500; }
    .form-group input {
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color .2s;
      background: white;
    }
    .form-group input:focus { border-color: var(--primary); }

    .btn-recarregar {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 22px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      transition: background .15s;
      flex-shrink: 0;
    }
    .btn-recarregar:hover { background: #6d28d9; }
    .btn-recarregar svg { width: 16px; height: 16px; }

    /* ── CARD SEMANA ── */
    .semana-card {
      background: white;
      border-radius: var(--radius);
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      overflow: hidden;
      margin-bottom: 20px;
    }

    .semana-header {
      background: #f5f3ff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      border-bottom: 1px solid #ede9fe;
    }
    .semana-header-left { display: flex; align-items: center; gap: 12px; }
    .semana-titulo { font-size: 1.5rem; font-weight: 700; color: var(--text); }
    .badge-comandos {
      background: var(--primary-lt);
      color: var(--primary);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
    }
    .semana-stats { display: flex; gap: 20px; flex-wrap: wrap; }
    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
    }
    .stat-item svg { width: 16px; height: 16px; color: var(--muted); }

    /* ── BUSCA ── */
    .busca-wrap {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .busca-wrap svg {
      position: absolute;
      left: 28px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      width: 16px;
      height: 16px;
    }
    .busca-input {
      width: 100%;
      padding: 9px 12px 9px 36px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.85rem;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      outline: none;
    }
    .busca-input:focus { border-color: var(--primary); }

    /* ── TABELA ── */
    .table-wrap { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    thead tr { border-bottom: 2px solid var(--border); }
    thead th {
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
    }
    thead th.num { text-align: right; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .1s;
      cursor: pointer;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fafafa; }

    tbody td { padding: 14px 16px; vertical-align: middle; }
    tbody td.num { text-align: right; }

    .td-comando { font-weight: 700; font-size: 0.85rem; white-space: nowrap; }
    .td-cor  { color: var(--muted); }
    .td-desc { color: var(--muted); }

    .td-baixado-ok  { color: var(--success); font-weight: 700; }
    .td-baixado-med { color: #d97706; font-weight: 700; }
    .td-baixado-low { color: #dc2626; font-weight: 700; }

    .td-saldo-zero { color: var(--success); font-weight: 700; }
    .td-saldo-pend { color: #d97706; font-weight: 700; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 400;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: white;
      border-radius: 16px 16px 0 0;
      width: 100%;
      max-width: 640px;
      max-height: 92vh;
      overflow-y: auto;
      animation: slideUp .25s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    .modal-header {
      background: var(--primary);
      color: white;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-radius: 16px 16px 0 0;
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .modal-back {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      border-radius: 8px;
      padding: 7px 14px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.82rem;
      cursor: pointer;
      flex-shrink: 0;
    }
    .modal-header-info .cmd  { font-size: 0.95rem; font-weight: 700; }
    .modal-header-info .prod { font-size: 0.75rem; opacity: .8; margin-top: 2px; }

    .modal-body { padding: 18px 20px 36px; }

    .modal-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .modal-grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 12px; }

    .info-tile {
      background: var(--bg);
      border-radius: 10px;
      padding: 12px 14px;
    }
    .info-tile .lbl { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
    .info-tile .val { font-size: 0.92rem; font-weight: 700; margin-top: 3px; }

    .ef-row {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--bg);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .ef-circle {
      width: 64px; height: 64px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; font-weight: 700;
      flex-shrink: 0;
    }
    .ef-ok  { background: #dcfce7; color: #16a34a; }
    .ef-med { background: #fef3c7; color: #d97706; }
    .ef-low { background: #fee2e2; color: #dc2626; }
    .ef-row-info .ef-label  { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
    .ef-row-info .ef-status { font-size: 0.95rem; font-weight: 700; margin-top: 3px; }
    .ef-row-info .ef-sub    { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

    .prog-box { background: var(--bg); border-radius: 10px; padding: 14px; margin-bottom: 12px; }
    .prog-top { display: flex; justify-content: space-between; font-size: 0.82rem; font-weight: 600; margin-bottom: 8px; }
    .prog-bar-bg { background: var(--border); border-radius: 6px; height: 9px; overflow: hidden; }
    .prog-bar-fill { height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--primary), #a78bfa); }
    .prog-sub { display: flex; justify-content: space-between; font-size: 0.72rem; color: var(--muted); margin-top: 6px; }

    .grade-box { background: var(--bg); border-radius: 10px; padding: 14px; margin-bottom: 12px; }
    .grade-box h3 { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; margin-bottom: 10px; }
    .grade-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
    @media(min-width:400px){ .grade-grid { grid-template-columns: repeat(8,1fr); } }
    .grade-item { background: white; border-radius: 8px; padding: 8px 4px; text-align: center; }
    .grade-item .g-tam { font-size: 0.65rem; color: var(--muted); font-weight: 600; }
    .grade-item .g-qtd { font-size: 1rem; font-weight: 700; margin-top: 2px; }
    .grade-item.zero { opacity: .35; }

    .obs-box { background: var(--bg); border-radius: 10px; padding: 14px; }
    .obs-box h3 { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; margin-bottom: 10px; }
    .obs-item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.82rem; }
    .obs-item:last-child { border-bottom: none; }
    .obs-data { color: var(--muted); font-size: 0.73rem; white-space: nowrap; }

    .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
    .empty p { font-weight: 600; margin-top: 10px; }

    @media (max-width: 600px) {
      .semana-stats { gap: 12px; }
      .stat-item { font-size: 0.78rem; }
      thead th, tbody td { padding: 10px 10px; font-size: 0.82rem; }
      .td-produto { max-width: 130px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<div class="top-nav">
  <div class="top-nav-left">
    <span class="nav-icon">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <path d="M3 9.75L12 3l9 6.75V21a1 1 0 01-1 1H4a1 1 0 01-1-1V9.75z"/>
        <path d="M9 22V12h6v10"/>
      </svg>
    </span>
    <span class="nav-icon">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <path d="M15 19l-7-7 7-7"/>
      </svg>
    </span>
  </div>
  <span class="nav-icon">
    <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
      <circle cx="12" cy="8" r="4"/>
      <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
    </svg>
  </span>
</div>

<!-- PAGE -->
<div class="page">

  <!-- PERÍODO -->
  <div class="periodo-card">
    <div class="periodo-titulo">Período</div>
    <div class="periodo-form">
      <div class="form-group">
        <label>Semana Inicial</label>
        <input type="number" id="sem-ini" value="12" min="1" max="52" />
      </div>
      <div class="form-group">
        <label>Semana Final</label>
        <input type="number" id="sem-fin" value="28" min="1" max="52" />
      </div>
      <button class="btn-recarregar" onclick="recarregar()">
        <svg fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
          <path d="M1 4v6h6"/><path d="M23 20v-6h-6"/>
          <path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/>
        </svg>
        Recarregar
      </button>
    </div>
  </div>

  <!-- SEMANA CARD -->
  <div id="semana-card" class="semana-card"></div>

</div>

<!-- MODAL DETALHE -->
<div class="modal-overlay" id="modal-overlay" onclick="fecharModalOverlay(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <button class="modal-back" onclick="fecharModal()">← Voltar</button>
      <div class="modal-header-info">
        <div class="cmd" id="m-cmd"></div>
        <div class="prod" id="m-prod"></div>
      </div>
    </div>
    <div class="modal-body">

      <div class="ef-row">
        <div class="ef-circle" id="m-ef-circle"></div>
        <div class="ef-row-info">
          <div class="ef-label">Eficiência</div>
          <div class="ef-status" id="m-ef-status"></div>
          <div class="ef-sub" id="m-ef-sub"></div>
        </div>
      </div>

      <div class="prog-box">
        <div class="prog-top">
          <span>Progresso de Baixa</span>
          <span id="m-prog-pct"></span>
        </div>
        <div class="prog-bar-bg">
          <div class="prog-bar-fill" id="m-prog-bar" style="width:0%"></div>
        </div>
        <div class="prog-sub">
          <span id="m-prog-left"></span>
          <span id="m-prog-right"></span>
        </div>
      </div>

      <div class="modal-grid-2">
        <div class="info-tile"><div class="lbl">Tecido</div><div class="val" id="m-tecido"></div></div>
        <div class="info-tile"><div class="lbl">Cor</div><div class="val" id="m-cor"></div></div>
        <div class="info-tile"><div class="lbl">Descrição</div><div class="val" id="m-desc"></div></div>
        <div class="info-tile"><div class="lbl">Linha</div><div class="val" id="m-linha"></div></div>
      </div>
      <div class="modal-grid-3">
        <div class="info-tile"><div class="lbl">Quantidade</div><div class="val" id="m-qtd"></div></div>
        <div class="info-tile"><div class="lbl">Baixado</div><div class="val" id="m-baixado"></div></div>
        <div class="info-tile"><div class="lbl">Saldo</div><div class="val" id="m-saldo"></div></div>
      </div>

      <div class="grade-box">
        <h3>Grade de Tamanhos</h3>
        <div class="grade-grid" id="m-grade"></div>
      </div>

      <div class="obs-box">
        <h3>Histórico / Observações</h3>
        <div id="m-obs"></div>
      </div>

    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  DADOS — substituir futuramente por:
//  const res = await fetch(`/api/erp/pcp?semIni=${ini}&semFin=${fin}`);
//  const dadosPCP = await res.json();
// ══════════════════════════════════════════════
const dadosPCP = [
  { semana:12, comando:"OPD002612.1", produto:"7696 - CALÇA FEM BOOTCUT PETIT",      cor:"JEANS",         desc:"REM 12", linha:"FEMININO",  tecido:"JULIA PLUS",     qtd:91,  baixado:91,  ef:86, grade:{34:5,36:7,38:12,40:12,42:24,44:12,46:12,48:7},   obs:[{data:"22/03",txt:"Baixa iniciada — 45 pçs confirmadas"},{data:"25/03",txt:"Finalização prevista para hoje"}] },
  { semana:12, comando:"OPD002598.1", produto:"6074 - CALÇA MAS RETA COMFORT",       cor:"UNICA",         desc:"REM 12", linha:"MASCULINO", tecido:"DENIM STRETCH",  qtd:100, baixado:100, ef:81, grade:{34:0,36:10,38:20,40:20,42:30,44:10,46:10,48:0},  obs:[{data:"20/03",txt:"OP liberada pelo PCP"},{data:"23/03",txt:"Eficiência abaixo da meta — monitorar"}] },
  { semana:12, comando:"OPD002598.2", produto:"96074 - CALÇA MAS RETA COMFORT",      cor:"UNICA",         desc:"REM 12", linha:"MASCULINO", tecido:"DENIM STRETCH",  qtd:30,  baixado:30,  ef:90, grade:{34:0,36:4,38:8,40:8,42:6,44:4,46:0,48:0},       obs:[{data:"21/03",txt:"Concluída sem intercorrências"}] },
  { semana:12, comando:"OPD002613.1", produto:"152 - CALÇA FEM SK CROPPED BV COLOR", cor:"MOCHA",         desc:"REM 12", linha:"FEMININO",  tecido:"SARJA ELASTANO", qtd:145, baixado:145, ef:93, grade:{34:10,36:20,38:30,40:30,42:30,44:15,46:10,48:0},obs:[{data:"24/03",txt:"Produção concluída"}] },
  { semana:12, comando:"OPD002614.2", produto:"9225 - BERM FEM CICLISTA COLOR",      cor:"MOCHA",         desc:"REM 12", linha:"FEMININO",  tecido:"MALHA CANELADA", qtd:42,  baixado:42,  ef:88, grade:{34:4,36:6,38:10,40:10,42:8,44:4,46:0,48:0},     obs:[{data:"23/03",txt:"Finalizado"}] },
  { semana:12, comando:"OPD002614.1", produto:"225 - BERM FEM CICLISTA COLOR",       cor:"MOCHA",         desc:"REM 12", linha:"FEMININO",  tecido:"MALHA CANELADA", qtd:208, baixado:208, ef:91, grade:{34:20,36:30,38:40,40:40,42:40,44:20,46:18,48:0},obs:[{data:"22/03",txt:"Alta eficiência registrada"}] },
  { semana:12, comando:"OPD002631.1", produto:"8102 - BERMUDA FEM CARGO",            cor:"VERDE MILITAR", desc:"REM 12", linha:"FEMININO",  tecido:"SARJA ELASTANO", qtd:150, baixado:90,  ef:92, grade:{34:10,36:20,38:30,40:30,42:30,44:20,46:10,48:0},obs:[{data:"24/03",txt:"Produção em andamento, 60% concluído"}] },
  { semana:12, comando:"OPD002644.2", produto:"9010 - JAQUETA MAS JEANS",            cor:"ÍNDIGO",        desc:"REM 12", linha:"MASCULINO", tecido:"DENIM RÍGIDO",   qtd:60,  baixado:15,  ef:74, grade:{34:0,36:0,38:10,40:15,42:20,44:10,46:5,48:0},   obs:[{data:"25/03",txt:"Atenção: eficiência crítica. Verificar setup."}] },
];

let busca = '';

function pct(b, t) { return t > 0 ? Math.round(b / t * 100) : 0; }
function efClasse(ef) { return ef >= 88 ? 'ef-ok' : ef >= 80 ? 'ef-med' : 'ef-low'; }
function efTexto(ef)  { return ef >= 88 ? '✅ Acima da meta' : ef >= 80 ? '⚠️ Abaixo da meta' : '❌ Crítico'; }

function getDados() {
  const ini = parseInt(document.getElementById('sem-ini').value) || 1;
  const fin = parseInt(document.getElementById('sem-fin').value) || 52;
  return dadosPCP.filter(op => {
    const inRange = op.semana >= ini && op.semana <= fin;
    const txt = (op.comando + op.produto + op.cor + op.desc + op.tecido).toLowerCase();
    return inRange && (!busca || txt.includes(busca.toLowerCase()));
  });
}

function renderSemana() {
  const ini = parseInt(document.getElementById('sem-ini').value) || 12;
  const ops  = getDados();
  const totalQtd  = ops.reduce((s,o) => s + o.qtd, 0);
  const totalBaix = ops.reduce((s,o) => s + o.baixado, 0);
  const totalSald = totalQtd - totalBaix;

  const card = document.getElementById('semana-card');
  card.innerHTML = `
    <div class="semana-header">
      <div class="semana-header-left">
        <span class="semana-titulo">Semana ${ini}</span>
        <span class="badge-comandos">${ops.length} comandos</span>
      </div>
      <div class="semana-stats">
        <div class="stat-item">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg>
          Qtd: ${totalQtd.toLocaleString('pt-BR')}
        </div>
        <div class="stat-item">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9 12l2 2 4-4"/></svg>
          Baixado: ${totalBaix.toLocaleString('pt-BR')}
        </div>
        <div class="stat-item">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Saldo: ${totalSald.toLocaleString('pt-BR')}
        </div>
      </div>
    </div>

    <div class="busca-wrap">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="busca-input" type="text" placeholder="Buscar comando, produto, cor..." value="${busca}" oninput="setBusca(this.value)" />
    </div>

    <div class="table-wrap">
      ${ops.length === 0
        ? `<div class="empty">
             <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
             <p>Nenhuma OP encontrada</p>
           </div>`
        : `<table>
             <thead>
               <tr>
                 <th>Comando</th>
                 <th>Produto</th>
                 <th>Cor</th>
                 <th>Descrição</th>
                 <th class="num">Quantidade</th>
                 <th class="num">Baixado</th>
                 <th class="num">Saldo</th>
               </tr>
             </thead>
             <tbody>
               ${ops.map(op => {
                 const saldo = op.qtd - op.baixado;
                 const p     = pct(op.baixado, op.qtd);
                 const bCls  = p === 100 ? 'td-baixado-ok' : p >= 60 ? 'td-baixado-med' : 'td-baixado-low';
                 const sCls  = saldo === 0 ? 'td-saldo-zero' : 'td-saldo-pend';
                 return `
                 <tr onclick="abrirModal('${op.comando}')">
                   <td class="td-comando">${op.comando}</td>
                   <td class="td-produto">${op.produto}</td>
                   <td class="td-cor">${op.cor}</td>
                   <td class="td-desc">${op.desc}</td>
                   <td class="num">${op.qtd}</td>
                   <td class="num ${bCls}">${op.baixado} (${p},0%)</td>
                   <td class="num ${sCls}">${saldo}</td>
                 </tr>`;
               }).join('')}
             </tbody>
           </table>`
      }
    </div>
  `;
}

function recarregar() { busca = ''; renderSemana(); }
function setBusca(v)  { busca = v; renderSemana(); }

// ── Modal ──
function abrirModal(id) {
  const op    = dadosPCP.find(o => o.comando === id);
  const saldo = op.qtd - op.baixado;
  const p     = pct(op.baixado, op.qtd);
  const ec    = efClasse(op.ef);

  document.getElementById('m-cmd').textContent    = op.comando;
  document.getElementById('m-prod').textContent   = op.produto;
  document.getElementById('m-tecido').textContent = op.tecido;
  document.getElementById('m-cor').textContent    = op.cor;
  document.getElementById('m-desc').textContent   = op.desc;
  document.getElementById('m-linha').textContent  = op.linha;
  document.getElementById('m-qtd').textContent    = op.qtd + ' pcs';
  document.getElementById('m-baixado').textContent = op.baixado + ' pcs';
  document.getElementById('m-saldo').textContent  = saldo + ' pcs';
  document.getElementById('m-prog-pct').textContent = p + '%';
  document.getElementById('m-prog-bar').style.width = p + '%';
  document.getElementById('m-prog-left').textContent  = op.baixado + ' peças produzidas';
  document.getElementById('m-prog-right').textContent = op.qtd + ' total';

  const efEl = document.getElementById('m-ef-circle');
  efEl.textContent = op.ef + '%';
  efEl.className   = 'ef-circle ' + ec;
  document.getElementById('m-ef-status').textContent = efTexto(op.ef);
  document.getElementById('m-ef-status').style.color =
    op.ef >= 88 ? 'var(--success)' : op.ef >= 80 ? '#d97706' : '#dc2626';
  document.getElementById('m-ef-sub').textContent = `Meta: 88% | Real: ${op.ef}%`;

  document.getElementById('m-grade').innerHTML = Object.entries(op.grade).map(([t,q]) =>
    `<div class="grade-item ${q===0?'zero':''}">
       <div class="g-tam">Tam ${t}</div>
       <div class="g-qtd">${q}</div>
     </div>`).join('');

  document.getElementById('m-obs').innerHTML = op.obs.map(o =>
    `<div class="obs-item">
       <span class="obs-data">${o.data}</span>
       <span>${o.txt}</span>
     </div>`).join('');

  document.getElementById('modal-overlay').classList.add('open');
}

function fecharModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function fecharModalOverlay(e) {
  if (e.target === document.getElementById('modal-overlay')) fecharModal();
}

// ── Init ──
renderSemana();
</script>
</body>
</html>
