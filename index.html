<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>PCP Digital</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary:      #4a1fa8;
      --primary-lt:   #ede8fa;
      --accent:       #7c3aed;
      --success:      #16a34a;
      --success-lt:   #dcfce7;
      --warning:      #d97706;
      --warning-lt:   #fef3c7;
      --danger:       #dc2626;
      --danger-lt:    #fee2e2;
      --bg:           #f4f5f8;
      --card:         #ffffff;
      --text:         #1e1e2e;
      --muted:        #6b7280;
      --border:       #e5e7eb;
      --radius:       12px;
      --shadow:       0 2px 8px rgba(0,0,0,0.08);
      --shadow-lg:    0 8px 24px rgba(0,0,0,0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .app-header {
      background: var(--primary);
      color: white;
      padding: 16px 20px 14px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(74,31,168,0.35);
    }
    .app-header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: .3px; }
    .app-header small { font-size: 0.75rem; opacity: .75; }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .semana-badge {
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.75rem;
      font-weight: 600;
      white-space: nowrap;
    }

    /* ── BUSCA + FILTRO ── */
    .search-bar {
      padding: 14px 16px 8px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 58px;
      z-index: 99;
    }
    .search-input-wrap {
      position: relative;
    }
    .search-input-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      padding: 10px 12px 10px 38px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      outline: none;
      transition: border-color .2s;
    }
    .search-input:focus { border-color: var(--accent); }

    .filter-chips {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }
    .filter-chips::-webkit-scrollbar { display: none; }

    .chip {
      flex-shrink: 0;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: white;
      color: var(--muted);
      transition: all .15s;
    }
    .chip.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    /* ── RESUMO ── */
    .resumo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 14px 16px 10px;
    }
    .resumo-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 12px;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .resumo-card .valor {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--primary);
    }
    .resumo-card .label { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }

    /* ── LISTA DE OPs ── */
    .container { padding: 0 16px 100px; max-width: 680px; margin: auto; }

    .secao-titulo {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .8px;
      padding: 12px 0 6px;
    }

    .op-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 10px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      border-left: 5px solid var(--primary);
      position: relative;
      overflow: hidden;
    }
    .op-card:active { transform: scale(0.98); }
    .op-card:hover { box-shadow: var(--shadow-lg); }

    .op-card-ef {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .ef-ok  { background: var(--success-lt); color: var(--success); }
    .ef-med { background: var(--warning-lt); color: var(--warning); }
    .ef-low { background: var(--danger-lt);  color: var(--danger); }

    .op-card-info { flex: 1; min-width: 0; }
    .op-card-cmd  { font-weight: 700; font-size: 0.92rem; font-family: 'DM Mono', monospace; }
    .op-card-prod { font-size: 0.78rem; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .op-card-meta {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .tag {
      font-size: 0.68rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--primary-lt);
      color: var(--primary);
    }
    .tag.green { background: var(--success-lt); color: var(--success); }
    .tag.orange { background: var(--warning-lt); color: var(--warning); }

    .op-card-right { text-align: right; flex-shrink: 0; }
    .op-card-qtd { font-size: 1.1rem; font-weight: 700; color: var(--text); }
    .op-card-pcs  { font-size: 0.68rem; color: var(--muted); }

    .progress-wrap { margin-top: 8px; background: var(--border); border-radius: 4px; height: 5px; overflow: hidden; }
    .progress-bar  { height: 100%; border-radius: 4px; background: var(--success); transition: width .4s; }

    /* ── DETALHE ── */
    #tela-detalhe {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 300;
      overflow-y: auto;
    }

    .det-header {
      background: var(--primary);
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .det-header-back {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      border-radius: 8px;
      padding: 8px 14px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      flex-shrink: 0;
    }
    .det-header-title .cmd { font-size: 1rem; font-weight: 700; font-family: 'DM Mono', monospace; }
    .det-header-title .prod { font-size: 0.75rem; opacity: .8; margin-top: 2px; }

    .det-section { padding: 16px; }
    .det-section + .det-section { padding-top: 0; }

    .det-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .det-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

    .info-box {
      background: var(--card);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow);
    }
    .info-box .lbl { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
    .info-box .val { font-size: 0.95rem; font-weight: 700; margin-top: 4px; }

    /* Eficiência grande */
    .ef-destaque {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 10px;
    }
    .ef-circulo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .ef-info .ef-titulo { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
    .ef-info .ef-status { font-size: 1.1rem; font-weight: 700; margin-top: 4px; }
    .ef-info .ef-meta   { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

    /* Barra de progresso grande */
    .progresso-box {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }
    .progresso-box .prog-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .progresso-box .prog-bar-wrap {
      background: var(--border);
      border-radius: 6px;
      height: 10px;
      overflow: hidden;
    }
    .progresso-box .prog-bar {
      height: 100%;
      border-radius: 6px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
    }
    .progresso-box .prog-sub {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 6px;
    }

    /* Grade de tamanhos */
    .grade-section { background: var(--card); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
    .grade-section h3 { font-size: 0.8rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; }
    .grade-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .grade-item {
      background: var(--bg);
      border-radius: 8px;
      padding: 10px 6px;
      text-align: center;
    }
    .grade-item .tam { font-size: 0.7rem; color: var(--muted); font-weight: 600; }
    .grade-item .qtd { font-size: 1.1rem; font-weight: 700; margin-top: 2px; }
    .grade-item.zero { opacity: 0.35; }

    /* Histórico/Observações */
    .obs-box {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }
    .obs-box h3 { font-size: 0.8rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
    .obs-item {
      display: flex;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.82rem;
    }
    .obs-item:last-child { border-bottom: none; }
    .obs-item .obs-data { color: var(--muted); white-space: nowrap; font-size: 0.75rem; font-family: 'DM Mono', monospace; }

    /* Vazio */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-state svg { margin-bottom: 12px; opacity: .4; }
    .empty-state p { font-weight: 600; }

    /* Toast de status ERP */
    .erp-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .erp-dot { width: 7px; height: 7px; border-radius: 50%; background: #86efac; animation: pulse 1.8s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    @media (min-width: 480px) {
      .grade-grid { grid-template-columns: repeat(8, 1fr); }
      .det-grid-3 { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>

<!-- ════════════════════════════════
     TELA LISTA
════════════════════════════════ -->
<div id="tela-lista">
  <header class="app-header">
    <div class="header-row">
      <div>
        <h1>PCP Digital</h1>
        <small>Wilian — Produção</small>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
        <span class="semana-badge">Semana 12</span>
        <span class="erp-badge"><span class="erp-dot"></span>ERP Conectado</span>
      </div>
    </div>
  </header>

  <!-- Busca + Filtros -->
  <div class="search-bar">
    <div class="search-input-wrap">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input
        class="search-input"
        type="text"
        id="input-busca"
        placeholder="Buscar OP, produto, tecido..."
        oninput="filtrar()"
      />
    </div>
    <div class="filter-chips">
      <span class="chip active" data-filtro="todos" onclick="setFiltro(this)">Todos</span>
      <span class="chip" data-filtro="alta" onclick="setFiltro(this)">✅ Ef. Alta</span>
      <span class="chip" data-filtro="baixa" onclick="setFiltro(this)">⚠️ Ef. Baixa</span>
      <span class="chip" data-filtro="feminino" onclick="setFiltro(this)">Feminino</span>
      <span class="chip" data-filtro="masculino" onclick="setFiltro(this)">Masculino</span>
    </div>
  </div>

  <!-- Resumo -->
  <div class="resumo-grid" id="resumo"></div>

  <!-- Lista -->
  <div class="container">
    <div class="secao-titulo">Ordens de Produção</div>
    <div id="lista-corpo"></div>
  </div>
</div>

<!-- ════════════════════════════════
     TELA DETALHE
════════════════════════════════ -->
<div id="tela-detalhe">
  <div class="det-header">
    <button class="det-header-back" onclick="fecharDetalhe()">← Voltar</button>
    <div class="det-header-title">
      <div class="cmd" id="det-comando"></div>
      <div class="prod" id="det-produto"></div>
    </div>
  </div>

  <div class="det-section">
    <!-- Eficiência -->
    <div class="ef-destaque">
      <div class="ef-circulo" id="det-ef-circulo"></div>
      <div class="ef-info">
        <div class="ef-titulo">Eficiência da OP</div>
        <div class="ef-status" id="det-ef-status"></div>
        <div class="ef-meta" id="det-ef-meta"></div>
      </div>
    </div>

    <!-- Progresso -->
    <div class="progresso-box" style="margin-bottom:10px">
      <div class="prog-label">
        <span>Progresso de Baixa</span>
        <span id="det-baixado-pct"></span>
      </div>
      <div class="prog-bar-wrap">
        <div class="prog-bar" id="det-prog-bar" style="width:0%"></div>
      </div>
      <div class="prog-sub">
        <span id="det-prog-sub-left"></span>
        <span id="det-prog-sub-right"></span>
      </div>
    </div>

    <!-- Info técnica -->
    <div class="det-grid-2" style="margin-bottom:10px">
      <div class="info-box"><div class="lbl">Tecido</div><div class="val" id="det-tecido"></div></div>
      <div class="info-box"><div class="lbl">Cor</div><div class="val" id="det-cor"></div></div>
      <div class="info-box"><div class="lbl">Destino</div><div class="val" id="det-destino"></div></div>
      <div class="info-box"><div class="lbl">Linha</div><div class="val" id="det-linha"></div></div>
    </div>

    <div class="det-grid-3" style="margin-bottom:10px">
      <div class="info-box"><div class="lbl">Qtd Total</div><div class="val" id="det-qtd"></div></div>
      <div class="info-box"><div class="lbl">Qtd Baixada</div><div class="val" id="det-baixada"></div></div>
      <div class="info-box"><div class="lbl">Saldo</div><div class="val" id="det-saldo"></div></div>
      <div class="info-box"><div class="lbl">Previsão</div><div class="val" id="det-previsao"></div></div>
    </div>
  </div>

  <!-- Grade de tamanhos -->
  <div class="det-section">
    <div class="grade-section">
      <h3>Grade de Tamanhos</h3>
      <div class="grade-grid" id="det-grade"></div>
    </div>
  </div>

  <!-- Observações -->
  <div class="det-section">
    <div class="obs-box">
      <h3>Histórico / Observações</h3>
      <div id="det-obs"></div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  DADOS — substituir por chamada à API do ERP
//  Exemplo futuro:
//    const dados = await fetchERP('/api/pcp/semana/12');
// ══════════════════════════════════════════════
const dadosPCP = [
  {
    comando:  "OPD002612.1",
    produto:  "7696 - CALÇA FEM BOOTCUT PETIT",
    cor:      "JEANS",
    tecido:   "JULIA PLUS",
    destino:  "LOJA SP",
    linha:    "FEMININO",
    qtd:      91,
    baixado:  91,
    ef:       86,
    previsao: "28/03",
    grade: { 34:5, 36:7, 38:12, 40:12, 42:24, 44:12, 46:12, 48:7 },
    obs: [
      { data: "22/03", texto: "Baixa iniciada — 45 peças confirmadas" },
      { data: "24/03", texto: "Tecido suplementar liberado pelo almoxarifado" },
      { data: "25/03", texto: "Finalização prevista para hoje" }
    ]
  },
  {
    comando:  "OPD002598.1",
    produto:  "6074 - CALÇA MAS RETA COMFORT",
    cor:      "UNICA",
    tecido:   "DENIM STRETCH",
    destino:  "E-COMMERCE",
    linha:    "MASCULINO",
    qtd:      100,
    baixado:  100,
    ef:       81,
    previsao: "26/03",
    grade: { 34:0, 36:10, 38:20, 40:20, 42:30, 44:10, 46:10, 48:0 },
    obs: [
      { data: "20/03", texto: "OP liberada pelo PCP" },
      { data: "23/03", texto: "Eficiência abaixo da meta — monitorar" }
    ]
  },
  {
    comando:  "OPD002631.1",
    produto:  "8102 - BERMUDA FEM CARGO",
    cor:      "VERDE MILITAR",
    tecido:   "SARJA ELASTANO",
    destino:  "ATACADO",
    linha:    "FEMININO",
    qtd:      150,
    baixado:  90,
    ef:       92,
    previsao: "30/03",
    grade: { 34:10, 36:20, 38:30, 40:30, 42:30, 44:20, 46:10, 48:0 },
    obs: [
      { data: "24/03", texto: "Produção em andamento, 60% concluído" }
    ]
  },
  {
    comando:  "OPD002644.2",
    produto:  "9010 - JAQUETA MAS JEANS",
    cor:      "ÍNDIGO",
    tecido:   "DENIM RÍGIDO",
    destino:  "LOJA RJ",
    linha:    "MASCULINO",
    qtd:      60,
    baixado:  15,
    ef:       74,
    previsao: "04/04",
    grade: { 34:0, 36:0, 38:10, 40:15, 42:20, 44:10, 46:5, 48:0 },
    obs: [
      { data: "25/03", texto: "Atenção: eficiência abaixo da meta. Verificar setup da máquina." }
    ]
  }
];

// ══ Estado da UI ══
let filtroAtivo = 'todos';
let busca = '';

// ══ Utilitários ══
function pct(val, total) { return total > 0 ? Math.round(val / total * 100) : 0; }

function efClasse(ef) {
  if (ef >= 88) return 'ef-ok';
  if (ef >= 80) return 'ef-med';
  return 'ef-low';
}

function efTexto(ef) {
  if (ef >= 88) return '✅ Acima da meta';
  if (ef >= 80) return '⚠️ Abaixo da meta';
  return '❌ Crítico';
}

// ══ Resumo ══
function renderResumo() {
  const total = dadosPCP.length;
  const acima = dadosPCP.filter(o => o.ef >= 88).length;
  const totalPcs = dadosPCP.reduce((s, o) => s + o.qtd, 0);
  document.getElementById('resumo').innerHTML = `
    <div class="resumo-card"><div class="valor">${total}</div><div class="label">OPs Ativas</div></div>
    <div class="resumo-card"><div class="valor">${acima}</div><div class="label">Ef. Alta</div></div>
    <div class="resumo-card"><div class="valor">${totalPcs}</div><div class="label">Total Peças</div></div>
  `;
}

// ══ Lista ══
function getDados() {
  return dadosPCP.filter(op => {
    const txt = (op.comando + op.produto + op.tecido + op.cor + op.linha).toLowerCase();
    const okBusca = !busca || txt.includes(busca.toLowerCase());
    let okFiltro = true;
    if (filtroAtivo === 'alta')     okFiltro = op.ef >= 88;
    if (filtroAtivo === 'baixa')    okFiltro = op.ef < 88;
    if (filtroAtivo === 'feminino') okFiltro = op.linha === 'FEMININO';
    if (filtroAtivo === 'masculino')okFiltro = op.linha === 'MASCULINO';
    return okBusca && okFiltro;
  });
}

function renderLista() {
  const ops = getDados();
  const corpo = document.getElementById('lista-corpo');
  if (!ops.length) {
    corpo.innerHTML = `
      <div class="empty-state">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <p>Nenhuma OP encontrada</p>
      </div>`;
    return;
  }
  corpo.innerHTML = ops.map(op => {
    const p = pct(op.baixado, op.qtd);
    const ec = efClasse(op.ef);
    return `
    <div class="op-card" onclick="ver('${op.comando}')">
      <div class="op-card-ef ${ec}">${op.ef}%</div>
      <div class="op-card-info">
        <div class="op-card-cmd">${op.comando}</div>
        <div class="op-card-prod">${op.produto}</div>
        <div class="op-card-meta">
          <span class="tag">${op.tecido}</span>
          <span class="tag">${op.linha}</span>
          <span class="tag ${p === 100 ? 'green' : 'orange'}">${p}% baixado</span>
        </div>
        <div class="progress-wrap">
          <div class="progress-bar" style="width:${p}%; background:${p===100?'var(--success)':'var(--accent)'}"></div>
        </div>
      </div>
      <div class="op-card-right">
        <div class="op-card-qtd">${op.qtd}</div>
        <div class="op-card-pcs">peças</div>
      </div>
    </div>`;
  }).join('');
}

// ══ Detalhe ══
function ver(id) {
  const op = dadosPCP.find(i => i.comando === id);
  const p = pct(op.baixado, op.qtd);
  const ec = efClasse(op.ef);

  document.getElementById('det-comando').textContent = op.comando;
  document.getElementById('det-produto').textContent  = op.produto;
  document.getElementById('det-tecido').textContent   = op.tecido;
  document.getElementById('det-cor').textContent      = op.cor;
  document.getElementById('det-destino').textContent  = op.destino;
  document.getElementById('det-linha').textContent    = op.linha;
  document.getElementById('det-qtd').textContent      = op.qtd + ' pcs';
  document.getElementById('det-baixada').textContent  = op.baixado + ' pcs';
  document.getElementById('det-saldo').textContent    = (op.qtd - op.baixado) + ' pcs';
  document.getElementById('det-previsao').textContent = op.previsao;
  document.getElementById('det-baixado-pct').textContent = p + '%';
  document.getElementById('det-prog-bar').style.width = p + '%';
  document.getElementById('det-prog-sub-left').textContent  = op.baixado + ' peças produzidas';
  document.getElementById('det-prog-sub-right').textContent = op.qtd + ' total';

  const efEl = document.getElementById('det-ef-circulo');
  efEl.textContent  = op.ef + '%';
  efEl.className    = 'ef-circulo ' + ec;
  document.getElementById('det-ef-status').textContent = efTexto(op.ef);
  document.getElementById('det-ef-status').style.color =
    op.ef >= 88 ? 'var(--success)' : op.ef >= 80 ? 'var(--warning)' : 'var(--danger)';
  document.getElementById('det-ef-meta').textContent = 'Meta: 88% | Real: ' + op.ef + '%';

  // Grade
  const gradeEl = document.getElementById('det-grade');
  gradeEl.innerHTML = Object.entries(op.grade).map(([tam, qtd]) => `
    <div class="grade-item ${qtd === 0 ? 'zero' : ''}">
      <div class="tam">Tam ${tam}</div>
      <div class="qtd">${qtd}</div>
    </div>`).join('');

  // Obs
  document.getElementById('det-obs').innerHTML = op.obs.map(o => `
    <div class="obs-item">
      <span class="obs-data">${o.data}</span>
      <span>${o.texto}</span>
    </div>`).join('');

  document.getElementById('tela-detalhe').style.display = 'block';
  document.getElementById('tela-detalhe').scrollTop = 0;
}

function fecharDetalhe() {
  document.getElementById('tela-detalhe').style.display = 'none';
}

// ══ Filtros ══
function setFiltro(el) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  filtroAtivo = el.dataset.filtro;
  renderLista();
}

function filtrar() {
  busca = document.getElementById('input-busca').value;
  renderLista();
}

// ══ Init ══
renderResumo();
renderLista();
</script>
